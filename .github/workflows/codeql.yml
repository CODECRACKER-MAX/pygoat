name: Security Scan Pipeline

on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    # FIXED: Added required permissions to write to the Security Tab
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
          
      - name: Pull Docker image
        run: |
          sudo docker pull pygoat/pygoat:latest

      - name: Start container
        run: |
          sudo docker run -d --name pygoat -p 8000:8000 pygoat/pygoat:latest

      - name: Test application
        run: |
          sleep 10
      
          echo "Running containers:"
          sudo docker ps -a
          
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.4.0
        with:
          target: 'http://127.0.0.1:8000'
      - name: Create sarif file from zaproxy results
        uses: SvanBoxel/zaproxy-to-ghas@main

        # Saving the Zap Scan
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v1
        with:
          sarif_file: results.sarif
