name: Security Scan Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    # FIXED: Added required permissions to write to the Security Tab
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
          
      - name: Pull Docker image
        run: |
          sudo docker pull pygoat/pygoat:latest

      - name: Start container
        run: |
          sudo docker run -d --name pygoat -p 8000:8000 pygoat/pygoat:latest

      - name: Test application
        run: |
          sleep 10
      
          echo "Running containers:"
          sudo docker ps -a

      - name: Run ZAP Full Scan (Token-Free Docker)
        run: |
          # 1. Create a local folder with write permissions for the reports
          mkdir -p ${{ github.workspace }}/zap-reports
          chmod 777 ${{ github.workspace }}/zap-reports
          
          # 2. Pull the official stable ZAP container image
          docker pull ghcr.io/zaproxy/zaproxy:stable
          
          # 3. Execute the full active scan using standard host networking
          docker run --network="host" \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py \
            -t http://localhost:8000/ \
            -r full-report.html \
            -w results.md \
            -J results.json

      - name: Save Scan Reports as Downloadable Artifacts
        uses: actions/upload-artifact@v4
        if: always() # Ensures you get your reports even if vulnerabilities are found
        with:
          name: zap-security-reports
          path: ${{ github.workspace }}/zap-reports/

