name: Security Scan Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    # FIXED: Added required permissions to write to the Security Tab
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
          
      - name: Pull Docker image
        run: |
          sudo docker pull pygoat/pygoat:latest

      - name: Start container
        run: |
          sudo docker run -d --name pygoat -p 8000:8000 pygoat/pygoat:latest

      - name: Test application
        run: |
          sleep 10
      
          echo "Running containers:"
          sudo docker ps -a
          
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: 'http://localhost:8000'
          # This forces the Docker container to share the runner's network loopback
          cmd_options: '-network host'
          # Generate the SARIF file natively without extra conversion steps
          sarif_file_name: 'zap_results.sarif'
          fail_action: false
      
      - name: Upload SARIF file to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Ensures reports upload even if vulnerabilities are found
        with:
          sarif_file: 'zap_results.sarif'
