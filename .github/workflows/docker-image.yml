name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker image
        run: |
          sudo docker pull pygoat/pygoat:latest

      - name: Start container
        run: |
          sudo docker run -d --name pygoat -p 8000:8000 pygoat/pygoat:latest

      - name: Test application
        run: |
          sleep 10
      
          echo "Running containers:"
          sudo docker ps -a
      
          echo "Container logs:"
          sudo docker logs pygoat

          echo "Curling application..."
          curl -L http://127.0.0.1:8000/

      - name: Check Networking
        run : |
          ip addr 
          ifconfig
          echo "Exit code: $?"
          
