name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker pull pygoat/pygoat:latest
        docker run --rm -p 8000:8000 pygoat/pygoat:latest -d
        curl http://127.0.0.1:8000 
