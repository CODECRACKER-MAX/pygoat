###
name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Test Internet Connection
      run: |
        sudo apt get update && sudo apt get upgrade
        sudo docker pull pygoat/pygoat:latest
        sudo docker run -d -p 8000:8000 pygoat/pygoat:latest
        
